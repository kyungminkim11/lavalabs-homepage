name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Generate SEO routes
        run: npm run prepare:pages
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run site smoke tests
        run: npm run test:site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-domain:
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5
    steps:
      - name: Verify custom domain serves this commit
        shell: bash
        run: |
          for attempt in {1..18}; do
            body="$(curl -fsSL --connect-timeout 10 --max-time 20 https://lavalabs.co.kr/deploy-version.json || true)"
            if printf '%s' "$body" | grep -Fq "$GITHUB_SHA"; then
              echo "lavalabs.co.kr is serving commit $GITHUB_SHA"
              exit 0
            fi
            echo "Attempt $attempt: custom domain has not updated yet"
            sleep 10
          done
          echo "GitHub Pages deployed, but the custom domain is not serving this commit. Check DNS and Pages settings."
          exit 1
