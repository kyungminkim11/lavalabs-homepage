name: Export Netlify Dist

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run prepare:pages
      - uses: actions/upload-artifact@v4
        with:
          name: netlify-dist
          path: dist
          retention-days: 1
          if-no-files-found: error
