name: Apply role-based email mapping
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[email-map]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update privacy and SoftMoon addresses
        shell: python
        run: |
          from pathlib import Path
          workflow = Path('.github/workflows/apply-email-map.yml')
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              try: old = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError): continue
              new = old
              lower = str(path).lower()
              if 'privacy' in lower:
                  new = new.replace('info@lavalabs.co.kr', 'privacy@lavalabs.co.kr').replace('lavalabs.ceo@gmail.com', 'privacy@lavalabs.co.kr')
              if 'softmoon' in lower or 'soft_moon' in lower:
                  new = new.replace('info@lavalabs.co.kr', 'softmoon@lavalabs.co.kr').replace('lavalabs.ceo@gmail.com', 'softmoon@lavalabs.co.kr')
              if path.as_posix() == 'scripts/page-data.mjs':
                  new = new.replace('개인정보 열람, 정정, 삭제 또는 처리 정지를 info@lavalabs.co.kr로 요청', '개인정보 열람, 정정, 삭제 또는 처리 정지를 privacy@lavalabs.co.kr로 요청')
                  new = new.replace('개인정보 관련 문의와 권리 요청: info@lavalabs.co.kr', '개인정보 관련 문의와 권리 요청: privacy@lavalabs.co.kr')
              if new != old: path.write_text(new, encoding='utf-8')
          workflow.unlink()
      - name: Commit changes
        run: |
          git config user.name "Lava Labs Automation"
          git config user.email "dev@lavalabs.co.kr"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update privacy and brand emails [email-map]"
          git push
