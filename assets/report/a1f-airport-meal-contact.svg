<svg xmlns="http://www.w3.org/2000/svg" width="620" height="250" viewBox="0 0 620 250"><rect width="620" height="250" fill="#fffaf4"/><text x="18" y="24" font-size="18" font-family="sans-serif" fill="#433">1일차 출국 전 공항 식사 · 김치찌개</text><text x="18" y="82" font-size="18" font-family="sans-serif" fill="#665">첨부 사진: 김치찌개 정식 / 호출벨 / 공항 표지</text><text x="18" y="126" font-size="14" font-family="sans-serif" fill="#887">원본 사진은 대화에 첨부됨. 보고서에는 출국 전 식사 사진 묶음으로 기록.</text><text x="18" y="170" font-size="14" font-family="sans-serif" fill="#887">면세구역 식당 · 팀 출국 전 일정 흐름 자료</text></svg>